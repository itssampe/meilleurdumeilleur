<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Meilleur du Meilleur</title>
  <desc id="desc">Le meilleur du meilleur, selon Reddit. Comparateur de produits basé sur les avis Reddit.</desc>
  <rect width="1400" height="520" fill="#fdf9f5"/>
  <rect width="1400" height="96" fill="#ff4500"/>
  <g transform="translate(78 27)">
