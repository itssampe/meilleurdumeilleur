  <g transform="translate(78 188)">
    <text fill="#241a15" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="62" font-weight="800">
      <tspan x="0" y="0">Le meilleur du meilleur, selon </tspan>
